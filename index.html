<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mission Timer">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0d10">
<title>Mission Timer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<style>
  :root{
    --bg: #0a0d10;
    --panel: #12171c;
    --panel-raised: #171d23;
    --line: #262f37;
    --amber: #ffb000;
    --amber-dim: #7a5800;
    --green: #2de08e;
    --green-dim: #0f5c3c;
    --text: #e6ecf0;
    --text-dim: #7c8894;
    --red: #ff4d4d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height:100vh;
  }
  .mono{
    font-family: 'SF Mono', 'Roboto Mono', ui-monospace, 'Courier New', monospace;
    font-variant-numeric: tabular-nums;
  }
  .wrap{
    max-width: 480px; margin: 0 auto; padding: 18px 16px 40px;
  }
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding: 6px 2px 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  header h1{
    font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 700; color: var(--text); margin:0;
  }
  header .reg{
    font-size: 13px; color: var(--amber); font-weight:600;
    background: none; border: none; text-align:right;
    border-bottom: 1px dashed var(--amber-dim);
    padding: 2px 0; width: 90px;
  }
  header .reg:focus{ outline:none; border-bottom-color: var(--amber); }
  header .reg::placeholder{ color: #4a3a1a; font-style: italic; font-weight:400; }
  header .header-right{
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
  }
  .route-clock-row{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 22px;
  }
  .route{
    font-size: 13px; color: var(--text); font-weight:600;
    background: none; border: none; text-align:left;
    border-bottom: 1px dashed #3a4048;
    padding: 4px 0; width: 150px; letter-spacing: 0.05em;
  }
  .route::placeholder{ color: #3a4048; font-style: italic; font-weight:400; }
  .route:focus{ outline:none; border-bottom-color: var(--text-dim); }

  .clock{
    text-align:right; color: var(--text-dim); font-size: 13px;
    letter-spacing: 0.05em;
  }
  .clock span{ color: var(--text-dim); font-size: 15px; }

  .flight-timer{
    text-align:center; margin-bottom: 22px; padding: 14px 16px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
  }
  .flight-timer.running{ border-color: var(--amber-dim); background: linear-gradient(180deg, #221a0c, #171310); }
  .flight-timer .label{
    font-size: 11px; letter-spacing:0.1em; text-transform:uppercase; color: var(--text-dim); margin-bottom: 6px;
  }
  .flight-timer .value{ font-size: 30px; font-weight:700; color: #3a444d; letter-spacing:0.02em; }
  .flight-timer.running .value{ color: var(--amber); }

  .step{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    transition: border-color .15s ease, background .15s ease;
  }
  .step-main{
    display:flex; align-items:center; justify-content:space-between; gap: 12px;
  }
  .step.done{
    border-color: var(--green-dim);
    background: linear-gradient(180deg, #12211b, #11191a);
  }
  .step-label{
    display:flex; flex-direction:column; gap:3px;
  }
  .step-label .name{
    font-size: 13px; letter-spacing:0.08em; text-transform:uppercase;
    color: var(--text-dim); font-weight:700;
  }
  .step.done .step-label .name{ color: var(--green); }
  .step-label .hint{ font-size: 11px; color: #56616c; }

  .fuel-row{
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line);
  }
  .fuel-row label{
    font-size: 11px; letter-spacing:0.08em; text-transform:uppercase; color: var(--text-dim);
  }
  input.fuel-input{
    -webkit-appearance:none; appearance:none;
    background: var(--panel-raised); border: 1px solid #33404a; color: var(--text);
    font-size: 15px; font-weight:600; text-align:right;
    padding: 8px 10px; border-radius: 8px; width: 84px;
    font-family: 'SF Mono', 'Roboto Mono', ui-monospace, 'Courier New', monospace;
  }
  input.fuel-input:focus{ outline:none; border-color: var(--amber); }
  input.fuel-input::placeholder{ color: #4a5560; }
  input.mission-time-inline{
    -webkit-appearance:none; appearance:none; background:transparent; border:none;
    font: inherit; color: inherit; padding:0; width:auto; color-scheme: dark;
  }
  input.mission-time-inline:focus{ outline:none; }

  .time-display{
    font-size: 26px; font-weight:600; color: #3a444d; min-width: 92px; text-align:right;
  }
  .step.done .time-display{ color: var(--text); }
  input.time-display{
    -webkit-appearance:none; appearance:none; background:transparent; border:none;
    font: inherit; color: inherit; padding:0; color-scheme: dark;
  }
  input.time-display:focus{ outline:none; }

  button.capture{
    -webkit-appearance:none; appearance:none; border:none; cursor:pointer;
    background: var(--panel-raised);
    border: 1px solid #33404a;
    color: var(--amber);
    font-size: 13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    padding: 14px 18px; border-radius: 12px;
    min-width: 108px;
    transition: transform .08s ease, background .12s ease;
  }
  button.capture:active{ transform: scale(0.96); background:#1e262e; }
  .step.done button.capture{
    background: var(--green-dim); color: #d8ffe9; border-color: var(--green);
  }

  .section-label{
    font-size: 12px; letter-spacing:0.12em; text-transform:uppercase; color: var(--text-dim);
    margin: 22px 2px 10px; font-weight:700;
  }

  .timer-card{
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px;
  }
  .timer-card.running{ border-color: var(--amber-dim); background: linear-gradient(180deg, #221a0c, #171310); }
  .timer-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .timer-name{ font-size: 13px; letter-spacing:0.08em; text-transform:uppercase; color: var(--text-dim); font-weight:700; }
  .timer-card.running .timer-name{ color: var(--amber); }
  .timer-sub{ font-size: 11px; color: #56616c; margin-top:2px; }
  .timer-big{
    font-size: 34px; font-weight:700; color: #3a444d; letter-spacing: 0.02em; margin: 4px 0 12px;
  }
  .timer-card.running .timer-big{ color: var(--amber); }
  button.btn-timer{
    -webkit-appearance:none; appearance:none; border:none; cursor:pointer; width:100%;
    background: var(--panel-raised); border: 1px solid #33404a; color: var(--text);
    font-size: 13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    padding: 13px; border-radius: 12px; transition: transform .08s ease, background .12s ease;
  }
  button.btn-timer:active{ transform: scale(0.97); }
  button.btn-timer.active{ background: var(--amber); color: #241900; border-color: var(--amber); }
  button.btn-timer:disabled{ opacity: 0.35; cursor: not-allowed; }

  .summary{
    margin-top: 18px; padding: 16px 18px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
  }
  .summary-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 8px 0; border-bottom: 1px solid var(--line);
  }
  .summary-row:last-child{ border-bottom:none; }
  .summary-row .label{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); }
  .summary-row .value{ font-size: 20px; font-weight:700; color: var(--amber); }

  .actions{ display:flex; gap:10px; margin-top:18px; }
  .btn{
    flex:1; -webkit-appearance:none; appearance:none; border:none; cursor:pointer;
    padding: 15px; border-radius: 12px; font-size: 14px; font-weight:700;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  .btn-save{ background: var(--green); color:#04201430; color:#052014; }
  .btn-reset{ background: transparent; color: var(--text-dim); border: 1px solid var(--line); }
  .btn:active{ transform: scale(0.97); }

  .history{ margin-top: 28px; }
  .history h2{
    font-size: 12px; letter-spacing:0.12em; text-transform:uppercase; color: var(--text-dim);
    margin: 0 0 10px 2px; display:flex; justify-content:space-between; align-items:center;
  }
  .history h2 button{
    background:none; border:none; color: var(--red); font-size:11px;
    letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; padding:4px;
  }
  .leg-card{
    background: var(--panel); border:1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; font-size: 13px;
  }
  .leg-card .row1{ display:flex; justify-content:space-between; color: var(--text-dim); margin-bottom:6px; }
  .leg-card .row2{ display:flex; justify-content:space-between; }
  .leg-card .times{ color: var(--text); }
  .leg-card .durations{ color: var(--amber); font-weight:600; }
  .empty{ color: var(--text-dim); font-size: 13px; text-align:center; padding: 20px 0; }

  .toast{
    position:fixed; bottom: 24px; left:50%; transform:translateX(-50%);
    background: var(--green); color:#052014; font-weight:700; font-size:13px;
    padding: 10px 18px; border-radius: 20px; opacity:0; pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Mission Timer</h1>
    <div class="header-right">
      <input class="reg mono" id="regInput" placeholder="Reg" maxlength="10">
    </div>
  </header>

  <div class="route-clock-row">
    <input class="route mono" id="routeInput" placeholder="Route" maxlength="40">
    <div class="clock mono">Now &nbsp; <span id="liveClock">--:--:--</span></div>
  </div>

  <div class="flight-timer" id="liftLandTimer">
    <div class="label">Lift → Land</div>
    <div class="value mono" id="liftLandValue">00:00:00</div>
  </div>

  <div class="step" id="step-off_blocks" data-key="off_blocks">
    <div class="step-main">
      <div class="step-label">
        <div class="name">Start</div>
        <div class="hint">Engine start</div>
      </div>
      <input type="time" class="time-display mono" id="disp-off_blocks" data-key="off_blocks">
      <button class="capture" data-key="off_blocks">Capture</button>
    </div>
    <div class="fuel-row">
      <label for="fuel-off_blocks">Fuel</label>
      <input class="fuel-input mono" id="fuel-off_blocks" data-fuel="off_blocks" type="text" inputmode="decimal" placeholder="kg">
    </div>
  </div>

  <div class="step" id="step-airborne" data-key="airborne">
    <div class="step-main">
      <div class="step-label">
        <div class="name">Lift</div>
        <div class="hint">Take-off</div>
      </div>
      <input type="time" class="time-display mono" id="disp-airborne" data-key="airborne">
      <button class="capture" data-key="airborne">Capture</button>
    </div>
  </div>

  <div class="section-label">Mission</div>

  <div class="timer-card" id="timer-mission">
    <div class="timer-top">
      <div>
        <div class="timer-name">Mission</div>
        <div class="timer-sub" id="sub-mission">
          <input type="time" class="mission-time-inline mono" id="mission-start-time"> → <input type="time" class="mission-time-inline mono" id="mission-end-time">
        </div>
      </div>
    </div>
    <div class="timer-big mono" id="big-mission">00:00:00</div>
    <div class="fuel-row">
      <label for="fuel-mission_start">Mission Start</label>
      <input class="fuel-input mono" id="fuel-mission_start" data-fuel="mission_start" type="text" inputmode="decimal" placeholder="kg">
    </div>
    <div class="fuel-row">
      <label for="fuel-mission_end">Mission End</label>
      <input class="fuel-input mono" id="fuel-mission_end" data-fuel="mission_end" type="text" inputmode="decimal" placeholder="kg">
    </div>
    <div class="actions" style="margin-top:16px;">
      <button class="btn-timer" id="start-mission" data-timer="mission" style="flex:1; width:auto;">Start Mission</button>
      <button class="btn-timer" id="end-mission" data-timer="mission" style="flex:1; width:auto;">End Mission</button>
    </div>
  </div>

  <div class="step" id="step-landed" data-key="landed">
    <div class="step-main">
      <div class="step-label">
        <div class="name">Land</div>
        <div class="hint">Touchdown</div>
      </div>
      <input type="time" class="time-display mono" id="disp-landed" data-key="landed">
      <button class="capture" data-key="landed">Capture</button>
    </div>
  </div>

  <div class="step" id="step-on_blocks" data-key="on_blocks">
    <div class="step-main">
      <div class="step-label">
        <div class="name">End</div>
        <div class="hint">Engine shutdown</div>
      </div>
      <input type="time" class="time-display mono" id="disp-on_blocks" data-key="on_blocks">
      <button class="capture" data-key="on_blocks">Capture</button>
    </div>
    <div class="fuel-row">
      <label for="fuel-on_blocks">Fuel</label>
      <input class="fuel-input mono" id="fuel-on_blocks" data-fuel="on_blocks" type="text" inputmode="decimal" placeholder="kg">
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-reset" id="resetBtn">Reset Leg</button>
    <button class="btn btn-save" id="saveBtn">Save Leg</button>
  </div>

  <div class="history">
    <h2>Saved Legs <span><button id="exportHistory" style="color:var(--green); margin-right:10px;">Export</button><button id="clearHistory">Clear all</button></span></h2>
    <div id="historyList"><div class="empty">No legs saved yet</div></div>
  </div>

  <div class="summary" id="totalFuelCard" style="margin-top:14px; display:none;">
    <div class="summary-row">
      <div class="label">Total Fuel Used (all legs)</div>
      <div class="value mono" id="totalFuelUsed">—</div>
    </div>
  </div>

  <div class="section-label" id="notifToggle" style="cursor:pointer;">Notifications ▸</div>
  <div class="timer-card" id="notifPanel" style="display:none;">
    <div class="fuel-row">
      <label for="workerUrl">Relay URL</label>
      <input class="fuel-input mono" id="workerUrl" type="text" placeholder="https://...workers.dev">
    </div>
    <div class="actions" style="margin-top:14px;">
      <button class="btn-timer" id="tgSaveBtn" style="flex:1; width:auto;">Save</button>
      <button class="btn-timer" id="tgTestBtn" style="flex:1; width:auto;">Send Test</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Leg saved</div>

<div id="doneBar" style="display:none; position:fixed; left:0; right:0; bottom:0; z-index:9999; background:#1c2126; border-top:1px solid #2a2f36; padding:10px 14px; justify-content:flex-end;">
  <button id="doneBarBtn" style="background:var(--amber); color:#241900; font-weight:700; font-size:16px; border:none; border-radius:10px; padding:10px 22px;">Done</button>
</div>
<script>
const STORAGE_KEY = 'flight-timer:legs';
const REG_KEY = 'flight-timer:reg';
const WORKER_URL_KEY = 'flight-timer:worker_url';
const STEP_LABELS = { off_blocks: 'Start', airborne: 'Lift', landed: 'Land', on_blocks: 'End' };

async function sendTelegram(text){
  let url;
  try{
    url = localStorage.getItem(WORKER_URL_KEY);
  }catch(e){ return; }
  if (!url) return;
  try{
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    });
  }catch(e){
    // Silent fail - never interrupt the actual logging flow over a network hiccup.
  }
}

function buildTelegramMessage(line){
  const reg = document.getElementById('regInput').value || 'Aircraft';
  const route = document.getElementById('routeInput').value;
  const header = route ? `${reg} - ${route}` : reg;
  return `${header}\n${line}`;
}
const keys = ['off_blocks','airborne','landed','on_blocks'];
let current = {};
let fuel = {};

// Toggle timer for mission (can be started/stopped, tracks segments)
let timers = {
  mission: { segments: [], running: false, currentStart: null }
};

function fmtHMS(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  return [h,m,s].map(n=>String(n).padStart(2,'0')).join(':');
}
function timerTotalMs(t, now){
  let ms = t.segments.reduce((sum,seg)=> sum + (seg.end - seg.start), 0);
  if (t.running && t.currentStart) ms += (now - t.currentStart);
  return ms;
}
function startTimer(name){
  const t = timers[name];
  if (t.running) return;
  t.running = true;
  t.currentStart = new Date();
  renderTimer(name);
  if (name === 'mission'){
    let msg = `Mission Start - ${toHHMM(t.currentStart)}`;
    if (fuel['mission_start']) msg += ` - Fuel ${fuel['mission_start']}kg`;
    sendTelegram(buildTelegramMessage(msg));
  }
}
function endTimer(name){
  const t = timers[name];
  if (!t.running) return;
  const end = new Date();
  t.segments.push({ start: t.currentStart, end: end });
  t.running = false;
  t.currentStart = null;
  renderTimer(name);
  if (name === 'mission'){
    const totalMs = t.segments.reduce((sum,seg)=> sum + (seg.end - seg.start), 0);
    const durMins = Math.round(totalMs / 60000);
    let msg = `Mission End - ${toHHMM(end)} (Duration: ${fmtDuration(durMins)})`;
    if (fuel['mission_end']) msg += ` - Fuel ${fuel['mission_end']}kg`;
    sendTelegram(buildTelegramMessage(msg));
  }
}
function setMissionStart(newDate){
  const t = timers.mission;
  if (t.running){
    t.currentStart = newDate;
  } else if (t.segments.length){
    t.segments[0].start = newDate;
  } else {
    t.running = true;
    t.currentStart = newDate;
  }
  renderTimer('mission');
  tickTimers();
}
function setMissionEnd(newDate){
  const t = timers.mission;
  if (t.running){
    t.segments.push({ start: t.currentStart, end: newDate });
    t.running = false;
    t.currentStart = null;
  } else if (t.segments.length){
    t.segments[t.segments.length-1].end = newDate;
  } else {
    t.segments.push({ start: newDate, end: newDate });
  }
  renderTimer('mission');
  tickTimers();
}
function renderTimer(name){
  const t = timers[name];
  const card = document.getElementById('timer-'+name);
  const startBtn = document.getElementById('start-'+name);
  const endBtn = document.getElementById('end-'+name);
  const sub = document.getElementById('sub-'+name);
  card.classList.toggle('running', t.running);
  startBtn.disabled = t.running;
  endBtn.disabled = !t.running;
  startBtn.classList.toggle('active', false);
  endBtn.classList.toggle('active', t.running);
  if (name === 'mission'){
    const startInput = document.getElementById('mission-start-time');
    const endInput = document.getElementById('mission-end-time');
    const startVal = t.currentStart || (t.segments.length ? t.segments[0].start : null);
    startInput.value = startVal ? toHHMM(startVal) : '';
    const endVal = (!t.running && t.segments.length) ? t.segments[t.segments.length-1].end : null;
    endInput.value = endVal ? toHHMM(endVal) : '';
  } else if (t.running){
    sub.textContent = 'Started ' + fmtTime(t.currentStart);
  } else if (t.segments.length){
    const last = t.segments[t.segments.length-1];
    sub.textContent = fmtTime(t.segments[0].start) + ' → ' + fmtTime(last.end);
  } else {
    sub.textContent = 'Not started';
  }
}
function tickTimers(){
  const now = new Date();
  const t = timers.mission;
  document.getElementById('big-mission').textContent = fmtHMS(timerTotalMs(t, now));
}
function resetTimers(){
  timers = {
    mission: { segments: [], running: false, currentStart: null }
  };
  renderTimer('mission');
  tickTimers();
}

function fmtTime(d){
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:false});
}
function toHHMM(d){
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtClock(d){
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
}
function diffMinutes(a,b){
  return Math.round((b-a)/60000);
}
function fmtDuration(mins){
  if (mins < 0) mins += 24*60;
  const h = Math.floor(mins/60), m = mins%60;
  return h + 'h ' + String(m).padStart(2,'0') + 'm';
}

function updateLiftLandTimer(){
  const card = document.getElementById('liftLandTimer');
  const val = document.getElementById('liftLandValue');
  if (!current.airborne){
    card.classList.remove('running');
    val.textContent = '00:00:00';
    return;
  }
  const end = current.landed ? current.landed : new Date();
  card.classList.toggle('running', !current.landed);
  val.textContent = fmtHMS(end - current.airborne);
}

function tickClock(){
  document.getElementById('liveClock').textContent = fmtClock(new Date());
  tickTimers();
  updateLiftLandTimer();
}
setInterval(tickClock, 1000);
tickClock();

function updateSummary(){
  // Block Time / Fuel Used / Mission Fuel Used summary card removed.
}

function fuelUsedBetween(f, startKey, endKey){
  if (!f) return null;
  const start = parseFloat(f[startKey]);
  const end = parseFloat(f[endKey]);
  if (isNaN(start) || isNaN(end)) return null;
  return start - end;
}
function fuelUsedFor(f){
  return fuelUsedBetween(f, 'off_blocks', 'on_blocks');
}

function capture(key){
  current[key] = new Date();
  document.getElementById('disp-'+key).value = toHHMM(current[key]);
  document.getElementById('step-'+key).classList.add('done');
  updateSummary();
  updateLiftLandTimer();
  let msg = `${STEP_LABELS[key] || key} - ${toHHMM(current[key])}`;
  if (fuel[key]) msg += ` - Fuel ${fuel[key]}kg`;
  sendTelegram(buildTelegramMessage(msg));
}

function resetLeg(){
  current = {};
  fuel = {};
  keys.forEach(k=>{
    document.getElementById('disp-'+k).value = '';
    document.getElementById('step-'+k).classList.remove('done');
  });
  document.querySelectorAll('.fuel-input').forEach(input=> input.value = '');
  document.getElementById('routeInput').value = '';
  resetTimers();
  updateSummary();
  updateLiftLandTimer();
}

function snapshotTimer(name){
  const t = timers[name];
  const now = new Date();
  const segments = t.segments.slice();
  if (t.running && t.currentStart) segments.push({ start: t.currentStart, end: now });
  const totalMs = segments.reduce((sum,seg)=> sum + (seg.end - seg.start), 0);
  return {
    start: segments.length ? segments[0].start.toISOString() : null,
    end: segments.length ? segments[segments.length-1].end.toISOString() : null,
    totalMinutes: Math.round(totalMs/60000),
    periods: segments.length
  };
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function loadHistory(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    return [];
  }
}
function saveHistory(legs){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(legs));
  }catch(e){ console.error('storage error', e); }
}

function renderHistory(legs){
  const el = document.getElementById('historyList');
  const totalCard = document.getElementById('totalFuelCard');
  if (!legs.length){
    el.innerHTML = '<div class="empty">No legs saved yet</div>';
    totalCard.style.display = 'none';
    return;
  }
  el.innerHTML = legs.slice().reverse().map(leg=>{
    const bt = (leg.off_blocks && leg.on_blocks) ? fmtDuration(diffMinutes(new Date(leg.off_blocks), new Date(leg.on_blocks))) : '—';
    const liftLandDur = (leg.airborne && leg.landed) ? fmtDuration(diffMinutes(new Date(leg.airborne), new Date(leg.landed))) : null;
    const dateStr = leg.savedAt ? new Date(leg.savedAt).toLocaleDateString('en-GB') : '';
    const mission = leg.mission && leg.mission.periods > 0
      ? `<div class="row2"><span class="times mono">Mission ${fmtTime(new Date(leg.mission.start))} → ${fmtTime(new Date(leg.mission.end))}</span><span class="durations mono">${fmtDuration(leg.mission.totalMinutes)}</span></div>`
      : '';
    const legFuelUsed = fuelUsedFor(leg.fuel);
    const fuelLabels = { off_blocks: 'Start', on_blocks: 'End', mission_start: 'Mission Start', mission_end: 'Mission End' };
    const fuelParts = leg.fuel ? Object.entries(leg.fuel)
      .filter(([k,v])=> v !== '' && v !== undefined && v !== null)
      .map(([k,v])=> `${fuelLabels[k] || k}: ${v}kg`) : [];
    const fuelLine = fuelParts.length
      ? `<div class="row2"><span class="times mono" style="color:var(--text-dim); font-size:11px;">${fuelParts.join(' · ')}</span>${legFuelUsed!==null ? `<span class="durations mono">Used ${legFuelUsed.toFixed(1)}kg</span>` : ''}</div>`
      : '';
    return `<div class="leg-card">
      <div class="row1"><span>${leg.reg || ''}${leg.route ? ' · ' + leg.route : ''}</span><span>${dateStr}</span></div>
      <div class="row2">
        <span class="times mono">Start ${leg.off_blocks?fmtTime(new Date(leg.off_blocks)):'--:--'}</span>
        <span class="times mono">Lift ${leg.airborne?fmtTime(new Date(leg.airborne)):'--:--'}</span>
      </div>
      ${mission}
      <div class="row2">
        <span class="times mono">Land ${leg.landed?fmtTime(new Date(leg.landed)):'--:--'}</span>
        <span class="times mono">End ${leg.on_blocks?fmtTime(new Date(leg.on_blocks)):'--:--'}</span>
      </div>
      <div class="row2">
        <span class="durations mono">Start-Stop ${bt}</span>
        ${liftLandDur ? `<span class="durations mono">Lift-Land ${liftLandDur}</span>` : ''}
      </div>
      ${fuelLine}
    </div>`;
  }).join('');

  const totalUsed = legs.reduce((sum, leg)=>{
    const u = fuelUsedFor(leg.fuel);
    return u !== null ? sum + u : sum;
  }, 0);
  const anyFuelData = legs.some(leg => fuelUsedFor(leg.fuel) !== null);
  if (anyFuelData){
    totalCard.style.display = 'block';
    document.getElementById('totalFuelUsed').textContent = totalUsed.toFixed(1) + ' kg';
  } else {
    totalCard.style.display = 'none';
  }
}

document.querySelectorAll('button.capture').forEach(btn=>{
  btn.addEventListener('click', ()=> capture(btn.dataset.key));
});

document.querySelectorAll('.fuel-input').forEach(input=>{
  input.addEventListener('input', ()=>{
    fuel[input.dataset.fuel] = input.value;
    updateSummary();
  });
});

document.querySelectorAll('input.time-display').forEach(input=>{
  input.addEventListener('change', ()=>{
    const key = input.dataset.key;
    if (!input.value){
      delete current[key];
      document.getElementById('step-'+key).classList.remove('done');
    } else {
      const [hh, mm] = input.value.split(':').map(Number);
      const base = current[key] instanceof Date ? new Date(current[key]) : new Date();
      base.setHours(hh, mm, 0, 0);
      current[key] = base;
      document.getElementById('step-'+key).classList.add('done');
    }
    updateSummary();
    updateLiftLandTimer();
  });
});

document.getElementById('start-mission').addEventListener('click', ()=> startTimer('mission'));
document.getElementById('end-mission').addEventListener('click', ()=> endTimer('mission'));

document.getElementById('mission-start-time').addEventListener('change', (e)=>{
  if (!e.target.value) return;
  const [hh, mm] = e.target.value.split(':').map(Number);
  const t = timers.mission;
  const refDate = t.currentStart || (t.segments[0] && t.segments[0].start) || new Date();
  const d = new Date(refDate);
  d.setHours(hh, mm, 0, 0);
  setMissionStart(d);
});

document.getElementById('mission-end-time').addEventListener('change', (e)=>{
  if (!e.target.value) return;
  const [hh, mm] = e.target.value.split(':').map(Number);
  const t = timers.mission;
  const refDate = (t.segments.length && t.segments[t.segments.length-1].end) || new Date();
  const d = new Date(refDate);
  d.setHours(hh, mm, 0, 0);
  setMissionEnd(d);
});

document.getElementById('resetBtn').addEventListener('click', resetLeg);

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const missionData = snapshotTimer('mission');
  const hasFlightData = current.off_blocks || current.on_blocks || current.airborne || current.landed;
  const hasTimerData = missionData.periods > 0;
  if (!hasFlightData && !hasTimerData){
    showToast('Nothing captured yet');
    return;
  }
  const legs = loadHistory();
  legs.push({
    reg: document.getElementById('regInput').value,
    route: document.getElementById('routeInput').value,
    off_blocks: current.off_blocks ? current.off_blocks.toISOString() : null,
    airborne: current.airborne ? current.airborne.toISOString() : null,
    landed: current.landed ? current.landed.toISOString() : null,
    on_blocks: current.on_blocks ? current.on_blocks.toISOString() : null,
    mission: missionData,
    fuel: { ...fuel },
    savedAt: new Date().toISOString()
  });
  saveHistory(legs);
  renderHistory(legs);
  showToast('Leg saved');
  resetLeg();
});

function legToText(leg){
  const lines = [];
  lines.push(`Reg: ${leg.reg || ''}`);
  if (leg.route) lines.push(`Route: ${leg.route}`);
  lines.push(`Date: ${leg.savedAt ? new Date(leg.savedAt).toLocaleDateString('en-GB') : ''}`);
  lines.push(`Start: ${leg.off_blocks ? fmtTime(new Date(leg.off_blocks)) : '--:--'}`);
  lines.push(`Lift: ${leg.airborne ? fmtTime(new Date(leg.airborne)) : '--:--'}`);
  if (leg.mission && leg.mission.periods > 0){
    lines.push(`Mission: ${fmtTime(new Date(leg.mission.start))} -> ${fmtTime(new Date(leg.mission.end))} (${fmtDuration(leg.mission.totalMinutes)})`);
  }
  lines.push(`Land: ${leg.landed ? fmtTime(new Date(leg.landed)) : '--:--'}`);
  lines.push(`End: ${leg.on_blocks ? fmtTime(new Date(leg.on_blocks)) : '--:--'}`);
  const bt = (leg.off_blocks && leg.on_blocks) ? fmtDuration(diffMinutes(new Date(leg.off_blocks), new Date(leg.on_blocks))) : null;
  if (bt) lines.push(`Start-Stop: ${bt}`);
  const liftLandDur = (leg.airborne && leg.landed) ? fmtDuration(diffMinutes(new Date(leg.airborne), new Date(leg.landed))) : null;
  if (liftLandDur) lines.push(`Lift-Land: ${liftLandDur}`);
  const fuelLabels = { off_blocks: 'Start', on_blocks: 'End', mission_start: 'Mission Start', mission_end: 'Mission End' };
  if (leg.fuel){
    const fuelParts = Object.entries(leg.fuel)
      .filter(([k,v])=> v !== '' && v !== undefined && v !== null)
      .map(([k,v])=> `${fuelLabels[k] || k}: ${v}kg`);
    if (fuelParts.length) lines.push(`Fuel: ${fuelParts.join(', ')}`);
    const used = fuelUsedFor(leg.fuel);
    if (used !== null) lines.push(`Fuel Used: ${used.toFixed(1)}kg`);
  }
  return lines.join('\n');
}

async function exportHistory(){
  const legs = loadHistory();
  if (!legs.length){
    showToast('No legs to export');
    return;
  }
  const text = legs.map(legToText).join('\n\n' + '-'.repeat(30) + '\n\n');
  const filename = 'flight-legs-' + new Date().toISOString().slice(0,10) + '.txt';
  const blob = new Blob([text], { type: 'text/plain' });

  try {
    const file = new File([blob], filename, { type: 'text/plain' });
    if (navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({ files: [file], title: 'Flight Legs Export' });
      showToast('Export shared');
      return;
    }
  } catch(e){
    if (e && e.name === 'AbortError') return;
  }

  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(()=> URL.revokeObjectURL(url), 60000);
  showToast('Export started');
}

document.getElementById('exportHistory').addEventListener('click', exportHistory);

document.getElementById('clearHistory').addEventListener('click', ()=>{
  saveHistory([]);
  renderHistory([]);
  showToast('History cleared');
});

document.getElementById('regInput').addEventListener('change', (e)=>{
  try{ localStorage.setItem(REG_KEY, e.target.value); }catch(err){}
});

(function init(){
  try{
    const reg = localStorage.getItem(REG_KEY);
    if (reg) document.getElementById('regInput').value = reg;
    const workerUrl = localStorage.getItem(WORKER_URL_KEY);
    if (workerUrl) document.getElementById('workerUrl').value = workerUrl;
  }catch(e){}
  const legs = loadHistory();
  renderHistory(legs);
  updateSummary();
  renderTimer('mission');
  tickTimers();
})();

document.getElementById('notifToggle').addEventListener('click', ()=>{
  const panel = document.getElementById('notifPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  document.getElementById('notifToggle').textContent = isOpen ? 'Notifications ▸' : 'Notifications ▾';
});

document.getElementById('tgSaveBtn').addEventListener('click', ()=>{
  try{
    localStorage.setItem(WORKER_URL_KEY, document.getElementById('workerUrl').value.trim());
    showToast('Settings saved');
  }catch(e){}
});

document.getElementById('tgTestBtn').addEventListener('click', ()=>{
  sendTelegram(buildTelegramMessage('Test message'));
  showToast('Test sent');
});

if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

(function(){
  const bar = document.getElementById('doneBar');
  const btn = document.getElementById('doneBarBtn');

  function positionBar(){
    if (window.visualViewport){
      const vv = window.visualViewport;
      const inset = window.innerHeight - (vv.height + vv.offsetTop);
      bar.style.transform = inset > 0 ? `translateY(-${inset}px)` : 'translateY(0)';
    }
  }
  function showBar(){
    bar.style.display = 'flex';
    positionBar();
  }
  function hideBar(){
    bar.style.display = 'none';
  }

  document.querySelectorAll('input.fuel-input, input.reg, input.route').forEach(inp=>{
    inp.addEventListener('focus', showBar);
    inp.addEventListener('blur', ()=>{
      setTimeout(()=>{
        const active = document.activeElement;
        if (!active || active.tagName !== 'INPUT') hideBar();
      }, 60);
    });
  });

  document.querySelectorAll('input.fuel-input').forEach(inp=>{
    inp.addEventListener('focus', ()=>{
      const len = inp.value.length;
      setTimeout(()=> inp.setSelectionRange(len, len), 0);
    });
  });

  btn.addEventListener('click', ()=>{
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    hideBar();
  });

  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', positionBar);
    window.visualViewport.addEventListener('scroll', positionBar);
  }
})();
</script>
</body>
</html>
